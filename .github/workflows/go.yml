name: Go

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  release:
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - name: Set short git commit SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o strx.linux-arm64@${{ steps.vars.outputs.short_sha }} .
      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          if-no-files-found: error
          name: "strx.linux-arm64@${{ steps.vars.outputs.short_sha }}"
          path: "strx.linux-arm64@${{ steps.vars.outputs.short_sha }}"
